server:
  port: 8082

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:h2:mem:paymentsdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: MySuperSecretKeyForJWTSigning2024ThatIsAtLeast256BitsLong!
  expiration: 3600000

logging:
  level:
    com.example: DEBUG
